suite: auth-credentials
description: Test gateway credential store configuration

tests:
  - it: should render GW_CRED env vars for each credential
    template: templates/deployment.yaml
    set:
      config.auth.credentials:
        - accessKey:
            value: "cred-access-key"
          secretKey:
            value: "cred-secret-key"
          label: "test"
      config.encryption.password.value: "test-password"
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GW_CRED_0_ACCESS_KEY
            value: "cred-access-key"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GW_CRED_0_SECRET_KEY
            value: "cred-secret-key"

  - it: should set AUTH_CREDENTIALS_FILE when existingCredentialsSecret is used
    template: templates/deployment.yaml
    set:
      config.auth.existingCredentialsSecret:
        name: my-creds
        key: creds.yaml
      config.encryption.password.value: "test-password"
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AUTH_CREDENTIALS_FILE
            value: "/etc/s3-gateway/auth-credentials/creds.yaml"
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: GW_CRED_0_ACCESS_KEY
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: gateway-auth-credentials
            mountPath: /etc/s3-gateway/auth-credentials
            readOnly: true
