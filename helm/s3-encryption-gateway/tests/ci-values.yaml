# Test values file for CI validation
replicaCount: 1

config:
  listenAddr:
    value: ":8080"
  logLevel:
    value: "info"
  auth:
    credentials:
      - accessKey:
          value: "test-access-key"
        secretKey:
          value: "test-secret-key"
        label: "ci-test"
  backend:
    endpoint:
      value: "https://s3.amazonaws.com"
    region:
      value: "us-east-1"
    accessKey:
      value: "backend-test-access-key"
    secretKey:
      value: "backend-test-secret-key"
    useSSL:
      value: "true"
    usePathStyle:
      value: "false"
  encryption:
    password:
      value: "test-password-123456"
    preferredAlgorithm:
      value: "AES256-GCM"
    supportedAlgorithms:
      value: "AES256-GCM"
  compression:
    enabled:
      value: "false"
  server:
    readTimeout:
      value: "0s"
    writeTimeout:
      value: "0s"
    idleTimeout:
      value: "60s"
    readHeaderTimeout:
      value: "10s"
    maxHeaderBytes:
      value: "1048576"
  tls:
    enabled:
      value: "false"
  rateLimit:
    enabled:
      value: "false"
  cache:
    enabled:
      value: "false"
  audit:
    enabled:
      value: "false"

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 64Mi
