# Default values for s3-encryption-gateway
# This is a YAML-formatted file.

replicaCount: 1

# Deployment track label for blue/green and canary topologies.
# Empty string (default) renders no `track` label — backward-compatible.
# Set to "blue", "green", "stable", or "canary" to mark pods for
# selector-based traffic routing. See docs/OPS_DEPLOYMENT.md for the
# blue/green and canary recipes.
#
# IMPORTANT: When `track` is set, `valkey.enabled` MUST be false and
# `config.multipartState.valkey.addr` MUST point to a shared external
# Valkey cluster. The chart enforces this at render time.
track: ""

image:
  repository: kenchrcum/s3-encryption-gateway
  pullPolicy: IfNotPresent
  tag: "0.8.0-rc1"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  seccompProfile:
    type: RuntimeDefault

service:
  # Enable Service creation. Set to false if deploying multiple instances
  # in different namespaces or using alternative ingress methods.
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 8080

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations:
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/proxy-body-size: "0"
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    # nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
  hosts:
    - host: s3-encryption-gateway.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: s3-encryption-gateway-tls
  #    hosts:
  #      - s3-encryption-gateway.local

  # Traefik IngressRoute / TraefikService sub-stanza.
  #
  # The chart's existing `ingress.enabled` block continues to render a
  # standard `networking.k8s.io/v1` Ingress (Traefik, Contour, HAProxy
  # Ingress, and Emissary all consume this). That path is unchanged.
  #
  # When an operator wants first-class Traefik CRDs (recommended for
  # blue/green and canary), enable this sub-stanza *instead of* the plain
  # `ingress.enabled`. The two are mutually exclusive — enabling both
  # renders a lint failure. See docs/OPS_DEPLOYMENT.md §3 / §4.
  traefik:
    # Render a Traefik IngressRoute CRD for this release.
    # Requires Traefik ≥ v3.0 (API group `traefik.io/v1alpha1`).
    # Mutually exclusive with `ingress.enabled: true`.
    enabled: false
    # entryPoints names to attach this IngressRoute to.
    entryPoints: ["websecure"]
    # Host() matcher — the S3 hostname clients will use.
    host: ""
    # TLS configuration (optional when the entrypoint provides a default cert).
    tls: {}
    #  secretName: ""        # referenced TLS Secret
    #  certResolver: ""      # Traefik cert-resolver name (optional)
    # Traefik Middleware references to chain in front of the gateway.
    middlewares: []
    #  - name: my-middleware
    #    namespace: default

    # Weighted TraefikService (kind: Weighted) — for CANARY topology.
    # Usually owned by ONE release (the stable side) and references both
    # the stable and canary release Services by name.
    weighted:
      enabled: false
      # services is the list of N backends with weights summing to 100.
      services: []
      #  - name: gw-stable      # Kubernetes Service name
      #    port: 80
      #    weight: 95
      #  - name: gw-canary
      #    port: 80
      #    weight: 5
      # sticky.cookie pins a given S3 client session to one backend —
      # recommended for this gateway to reduce Valkey round-trips during
      # in-flight multipart uploads.
      sticky: {}
      #  cookie:
      #    name: gw-pin
      #    httpOnly: true
      #    secure: true
      #    sameSite: lax

# Configuration - supports both direct values and valueFrom (secrets/configmaps)
# Each option can be configured as:
#   - Direct value: value: "my-value"
#   - From Secret: valueFrom: { secretKeyRef: { name: "my-secret", key: "my-key" } }
#   - From ConfigMap: valueFrom: { configMapKeyRef: { name: "my-configmap", key: "my-key" } }

config:
  # Basic server configuration
  listenAddr:
    value: ":8080"
  logLevel:
    value: "info"
  
  # Policy configuration
  # Path glob for policy YAML files that have already been mounted into the
  # container (e.g. via extraVolumes/extraVolumeMounts or an external ConfigMap).
  # When `policies` (top-level, see below) is non-empty the chart auto-sets
  # this to "/etc/s3-gateway/policies/*.yaml" — do NOT set both.
  policies:
    value: ""
    valueFrom: {}
    # Example (only when NOT using the top-level `policies` list):
    # value: "/etc/s3-gateway/policies/*.yaml"
  
  # Proxied bucket configuration (optional - restricts gateway to single bucket)
  proxiedBucket:
    value: ""
    valueFrom: {}
    # Example:
    # value: "my-bucket"
    # Or use valueFrom:
    # valueFrom:
    #   secretKeyRef:
    #     name: s3-encryption-gateway-secrets
    #     key: proxied-bucket

  auth:
    clockSkewTolerance:
      value: "5m"
    # Gateway credential store — at least one entry required.
    # Every inbound S3 request must present one of these access keys
    # with a valid AWS Signature (V2 or V4).
    credentials:
      - accessKey:
          value: ""
          valueFrom:
            secretKeyRef:
              name: s3-encryption-gateway-secrets
              key: gateway-access-key
        secretKey:
          value: ""
          valueFrom:
            secretKeyRef:
              name: s3-encryption-gateway-secrets
              key: gateway-secret-key
        label: "default"

    # Alternatively, reference an existing Kubernetes Secret containing the
    # full credentials list as a single file (YAML or JSON). Useful when
    # credentials are synced from an external system (e.g. HashiCorp Vault).
    # When set, this takes precedence over individual credential entries above.
    # existingCredentialsSecret:
    #   name: gateway-credentials
    #   key: credentials.yaml

  # Backend S3 configuration
  backend:
    endpoint:
      value: "https://s3.amazonaws.com"
      # valueFrom:
      #   configMapKeyRef:
      #     name: s3-encryption-gateway-config
      #     key: backend-endpoint
    region:
      value: "us-east-1"
      # valueFrom:
      #   configMapKeyRef:
      #     name: s3-encryption-gateway-config
      #     key: backend-region
    accessKey:
      value: ""
      valueFrom:
        secretKeyRef:
          name: s3-encryption-gateway-secrets
          key: backend-access-key
    secretKey:
      value: ""
      valueFrom:
        secretKeyRef:
          name: s3-encryption-gateway-secrets
          key: backend-secret-key
    provider:
      value: ""
      valueFrom: {}
      # valueFrom:
      #   configMapKeyRef:
      #     name: s3-encryption-gateway-config
      #     key: backend-provider
    useSSL:
      value: "true"
    usePathStyle:
      value: "false"


  # Encryption configuration
  encryption:
    password:
      value: ""
      valueFrom:
        secretKeyRef:
          name: s3-encryption-gateway-secrets
          key: encryption-password
    keyFile:
      value: ""
      valueFrom: {}
      # valueFrom:
      #   secretKeyRef:
      #     name: s3-encryption-gateway-secrets
      #     key: encryption-key-file
    preferredAlgorithm:
      value: "AES256-GCM"
      valueFrom: {}
      # valueFrom:
      #   configMapKeyRef:
      #     name: s3-encryption-gateway-config
      #     key: encryption-preferred-algorithm
    supportedAlgorithms:
      value: "AES256-GCM,ChaCha20-Poly1305"
      valueFrom: {}
      # valueFrom:
      #   configMapKeyRef:
      #     name: s3-encryption-gateway-config
      #     key: encryption-supported-algorithms
    keyManager:
      enabled:
        value: "false"
        # valueFrom:
        #   configMapKeyRef:
        #     name: s3-encryption-gateway-config
        #     key: key-manager-enabled
      provider:
        value: "cosmian"
        # valueFrom:
        #   configMapKeyRef:
        #     name: s3-encryption-gateway-config
        #     key: key-manager-provider
      dualReadWindow:
        value: "1"
        # valueFrom:
        #   configMapKeyRef:
        #     name: s3-encryption-gateway-config
        #     key: key-manager-dual-read-window
      cosmian:
        endpoint:
          # RECOMMENDED: JSON/HTTP endpoint (tested and verified in CI)
          # Full URL format (recommended): "http://host:9998/kmip/2_1" or "https://host:9998/kmip/2_1"
          # Base URL format (also works): "http://host:9998" (path /kmip/2_1 is auto-appended)
          # ADVANCED: Binary KMIP endpoint (requires TLS certificates)
          # Format: "host:5696" - requires caCert, clientCert, clientKey
          value: ""
          # valueFrom:
          #   secretKeyRef:
          #     name: s3-encryption-gateway-secrets
          #     key: cosmian-kms-endpoint
        timeout:
          value: "10s"
          # valueFrom:
          #   configMapKeyRef:
          #     name: s3-encryption-gateway-config
          #     key: cosmian-kms-timeout
        keys:
          # Keys can be specified via environment variable (comma-separated: "key1:1,key2:2")
          # Format: "key1:version1,key2:version2"
          # Example: "wrapping-key-1:1" or "wrapping-key-1:1,wrapping-key-2:2" for rotation
          value: ""
          # valueFrom:
          #   secretKeyRef:
          #     name: s3-encryption-gateway-secrets
          #     key: cosmian-kms-keys
        caCert:
          # TLS CA certificate (recommended for HTTPS, required for binary KMIP)
          value: ""
          # valueFrom:
          #   secretKeyRef:
          #     name: s3-encryption-gateway-secrets
          #     key: cosmian-kms-ca-cert
        clientCert:
          # TLS client certificate (required for binary KMIP mutual TLS)
          value: ""
          # valueFrom:
          #   secretKeyRef:
          #     name: s3-encryption-gateway-secrets
          #     key: cosmian-kms-client-cert
        clientKey:
          # TLS client key (required for binary KMIP mutual TLS)
          value: ""
          # valueFrom:
          #   secretKeyRef:
          #     name: s3-encryption-gateway-secrets
          #     key: cosmian-kms-client-key
        insecureSkipVerify:
          # Skip TLS verification (testing only - not recommended for production)
          value: "false"
          # valueFrom:
          #   configMapKeyRef:
          #     name: s3-encryption-gateway-config
          #     key: cosmian-kms-insecure-skip-verify

    kdf:
      pbkdf2:
        iterations:
          value: "600000"
          valueFrom: {}
          # valueFrom:
          #   configMapKeyRef:
          #     name: s3-encryption-gateway-config
          #     key: encryption-kdf-pbkdf2-iterations
          # Increase above 600000 to exceed the NIST SP 800-132 (2023) floor.
          # Do not set below 100000. Legacy objects (written before V1.0-SEC-H03)
          # are decrypted transparently regardless of this setting.

  # Compression configuration
  compression:
    enabled:
      value: "false"
    minSize:
      value: "1024"
    contentTypes:
      value: "text/plain,application/json,application/xml"
    algorithm:
      value: "gzip"
    level:
      value: "6"

  # Server timeout configuration
  server:
    readTimeout:
      value: "0s"  # Disabled; readHeaderTimeout guards slow-loris; ReadTimeout kills long object streams
    writeTimeout:
      value: "0s"  # Disabled; gateway streams arbitrarily large S3 objects
    idleTimeout:
      value: "60s"
    readHeaderTimeout:
      value: "10s"
    maxHeaderBytes:
      value: "1048576"

  # TLS configuration
  tls:
    enabled:
      value: "false"
    # Enable cert-manager for automatic certificate management
    # When enabled, a self-signed certificate will be automatically created
    # and mounted into the pod. The certFile and keyFile will be automatically
    # configured to use the mounted certificate.
    useCertManager:
      value: "false"
    certFile:
      value: ""
      valueFrom: {}
      # valueFrom:
      #   secretKeyRef:
      #     name: s3-encryption-gateway-secrets
      #     key: tls-cert-file
    keyFile:
      value: ""
      valueFrom: {}
      # valueFrom:
      #   secretKeyRef:
      #     name: s3-encryption-gateway-secrets
      #     key: tls-key-file

  # Rate limiting configuration
  rateLimit:
    enabled:
      value: "false"
    limit:
      value: "100"
    window:
      value: "60s"

  # Cache configuration
  cache:
    enabled:
      value: "false"
    maxSize:
      value: "104857600"
    maxItems:
      value: "1000"
    defaultTTL:
      value: "5m"

  # Audit configuration
  audit:
    enabled:
      value: "false"
    maxEvents:
      value: "10000"
    redactMetadataKeys:
      value: ""
      valueFrom: {}
    sink:
      type:
        value: "stdout"
      endpoint:
        value: ""
        valueFrom: {}
      filePath:
        value: ""
        valueFrom: {}
      batchSize:
        value: "100"
      flushInterval:
        value: "5s"
      retryCount:
        value: "3"
      retryBackoff:
        value: "1s"

  # ── Encrypted multipart upload state store (V0.6-SEC-3 / ADR-0009) ─────────
  # When `valkey.enabled: true` (below, top-level), the deployment template
  # auto-wires VALKEY_ADDR to the Valkey subchart's primary service. The
  # values below are for supplying an external Valkey cluster instead; leave
  # blank to inherit the in-cluster subchart address.
  multipartState:
    valkey:
      addr:
        value: ""
        valueFrom: {}
      tls:
        enabled:
          value: ""
        caFile:
          value: ""
        certFile:
          value: ""
        keyFile:
          value: ""
      # insecureAllowPlaintext permits a non-TLS Valkey connection.
      #
      # WARNING: Enabling this in production exposes WrappedDEKs (and all
      # multipart-upload metadata) on the network in plaintext. The DEK itself
      # is already wrapped by the KeyManager, but the wrapped envelope, IV
      # prefixes, bucket names, object keys, and part metadata are all readable
      # by anyone on the wire. This flag is intended for development/testing
      # only. Production deployments must set tls.enabled=true.
      insecureAllowPlaintext:
        value: ""
      # ttlSeconds: how long an in-flight MPU state record lives in Valkey
      # before TTL expiry reaps it. Default (inside the gateway) is 604800 (7d).
      ttlSeconds:
        value: ""

# ── First-class bucket policies ────────────────────────────────────────────
# Define bucket policies inline in values.yaml. The chart renders a single
# ConfigMap (<release>-policies) from these entries, mounts it at
# /etc/s3-gateway/policies/, and auto-sets the POLICIES env var.
#
# Each item maps directly to a PolicyConfig (internal/config/policy.go):
#   id                        – unique policy identifier (required)
#   buckets                   – list of bucket name glob patterns (required)
#   encrypt_multipart_uploads – opt-in encrypted MPU per ADR-0009 (requires Valkey)
#   require_encryption        – hard-reject unencrypted PutObject for these buckets
#   disallow_lock_bypass      – reject requests that try to bypass object lock
#   encryption / compression / rate_limit  – per-bucket overrides (optional)
#
# Mutually exclusive with config.policies.value / config.policies.valueFrom.
# Both set → helm lint / helm install --dry-run will fail (Guard 6).
#
# Example:
# policies:
#   - id: encrypted-uploads
#     buckets:
#       - "my-important-bucket"
#       - "logs-*"
#     encrypt_multipart_uploads: true
#     require_encryption: true
#   - id: public-assets
#     buckets:
#       - "public-*"
#     require_encryption: false
policies: []

# cert-manager configuration
certManager:
  # Issuer configuration
  issuer:
    # Name for the issuer (defaults to fullname)
    name: ""
    # Namespace for the issuer (defaults to release namespace)
    namespace: ""
    # Self-signed issuer configuration
    selfSigned: {}
    # Or use ClusterIssuer instead (requires cluster-admin)
    # clusterIssuer: "letsencrypt-prod"
  # Certificate configuration
  certificate:
    # Additional DNS names for the certificate
    extraDNSNames: []
    # Certificate duration (default: 2160h = 90 days)
    duration: "2160h"
    # How long before expiry to renew (default: 720h = 30 days)
    renewBefore: "720h"

# Extra environment variables to add to the main container
extraEnv: []
# Example:
# extraEnv:
#   - name: MY_CUSTOM_VAR
#     value: "my-value"
#   - name: MY_SECRET_VAR
#     valueFrom:
#       secretKeyRef:
#         name: my-secret
#         key: my-key

# Extra volume mounts to add to the main container
extraVolumeMounts: []
# Example:
# extraVolumeMounts:
#   - name: my-config
#     mountPath: /etc/my-config
#     readOnly: true

# Extra volumes to add to the pod spec
extraVolumes: []
# Example:
# extraVolumes:
#   - name: my-config
#     configMap:
#       name: my-configmap
#   - name: my-secret
#     secret:
#       secretName: my-secret

# Init containers to run before the main container
initContainers: []
# Example:
# initContainers:
#   - name: init-myservice
#     image: busybox:1.35
#     command: ['sh', '-c', 'echo initializing...']
#     volumeMounts:
#       - name: my-volume
#         mountPath: /data

# Sidecar containers to run alongside the main container
sidecars: []
# Example:
# sidecars:
#   - name: sidecar-logger
#     image: fluent/fluent-bit:2.0
#     ports:
#       - containerPort: 2020
#     volumeMounts:
#       - name: varlogcontainers
#         mountPath: /var/log/containers
#         readOnly: true

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 64Mi

livenessProbe:
  httpGet:
    path: /live
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  # minAvailable: 1
  # maxUnavailable: 50%
  minAvailable: ""
  maxUnavailable: ""

# Prometheus ServiceMonitor (requires Prometheus Operator)
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

# Prometheus PodMonitor (alternative to ServiceMonitor, requires Prometheus Operator)
podMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

# Network policy
networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress
  # Restrict ingress to same namespace only
  # When true, only pods in the same namespace can access the gateway
  # When false, pods from any namespace can access (default behavior)
  namespaceIsolation: true
  # Namespace label for isolation (optional)
  # If not specified, uses kubernetes.io/metadata.name (standard Kubernetes label)
  # Format: key: value (e.g., "kubernetes.io/metadata.name: my-namespace")
  # If your namespace doesn't have kubernetes.io/metadata.name, you can:
  # 1. Label your namespace: kubectl label namespace <name> name=<name>
  # 2. Or specify a custom label here
  namespaceLabel:
    key: "kubernetes.io/metadata.name"
    # value will be set to Release.Namespace automatically
  # Egress rules for common topologies
  egress:
    # Enable AWS S3 egress rules (adjust CIDRs for your specific regions)
    awsS3: false
    # Enable MinIO internal cluster egress rules
    minioInternal: false
    # Enable monitoring and logging service egress rules
    monitoring: false
  # Ingress rules for common topologies
  ingress:
    # Enable ingress from ingress controllers
    ingressControllers: false
    # Namespace for ingress controllers (default: ingress-nginx)
    ingressNamespace: "ingress-nginx"
    # Enable ingress from monitoring services
    monitoring: false
    # Namespace for monitoring services (default: monitoring)
    monitoringNamespace: "monitoring"

# Pod lifecycle knobs for safe progressive delivery.
# Defaults preserve current behaviour. For blue/green and canary deployments
# set `terminationGracePeriodSeconds` ≥ 99th-p request duration + 10 s
# kube-proxy propagation tail, and add a preStop sleep equal to the
# propagation tail. See docs/OPS_DEPLOYMENT.md §2 for sizing guidance.
terminationGracePeriodSeconds: 30
lifecycle: {}
#  preStop:
#    exec:
#      command: ["sh", "-c", "sleep 10"]

nodeSelector: {}

tolerations: []

affinity: {}

# Topology spread constraints for pod distribution
topologySpreadConstraints: []
# Example:
# topologySpreadConstraints:
#   - maxSkew: 1
#     topologyKey: kubernetes.io/hostname
#     whenUnsatisfiable: DoNotSchedule
#     labelSelector:
#       matchLabels:
#         app.kubernetes.io/name: s3-encryption-gateway
#   - maxSkew: 1
#     topologyKey: topology.kubernetes.io/zone
#     whenUnsatisfiable: ScheduleAnyway
#     labelSelector:
#       matchLabels:
#         app.kubernetes.io/name: s3-encryption-gateway

# Valkey subchart configuration (for MPU state store)
valkey:
  enabled: false
  architecture: standalone
  auth:
    enabled: false
