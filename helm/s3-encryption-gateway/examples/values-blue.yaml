# helm/s3-encryption-gateway/examples/values-blue.yaml
#
# Blue side of a blue/green deployment.
# See docs/OPS_DEPLOYMENT.md §3 for the full step-by-step procedure.
#
# PRECONDITIONS (enforced by template guards + runbook checklist):
#   1. A shared external Valkey cluster is reachable at the address below.
#      The per-release Valkey subchart is DISABLED (valkey.enabled: false).
#   2. The ENCRYPTION_PASSWORD / active KMS key_version MUST match the
#      green release exactly. Objects wrapped by blue must be readable on
#      green after the traffic flip.
#   3. The shared Service (docs/examples/bluegreen/service.yaml) is deployed
#      separately and points at track=blue by default. The chart does NOT
#      own the Service when track is set (service.enabled: false below).
#   4. Run scripts/verify-key-parity.sh to confirm both releases share the
#      same KEY_MANAGER_PROVIDER / COSMIAN_KMS_KEYS before cutover.

# ---------------------------------------------------------------------------
# Replica count — blue/green should have ≥ 2 pods per colour for HA.
replicaCount: 3

# Label pods with track=blue so the shared operator-owned Service can
# select them via its selector. See docs/examples/bluegreen/service.yaml.
track: blue

# The chart must NOT own the Service — the operator owns it so the selector
# can be atomically patched to flip traffic between blue and green.
service:
  enabled: false

# Disable the per-release Valkey subchart. Both colours MUST share a single
# external Valkey so that multipart upload state survives the traffic flip.
valkey:
  enabled: false

config:
  # ── Fill in your backend and encryption settings ────────────────────────
  backend:
    endpoint:
      value: "https://s3.amazonaws.com"
    region:
      value: "us-east-1"
    accessKey:
      valueFrom:
        secretKeyRef:
          name: s3-encryption-gateway-secrets
          key: backend-access-key
    secretKey:
      valueFrom:
        secretKeyRef:
          name: s3-encryption-gateway-secrets
          key: backend-secret-key

  encryption:
    password:
      valueFrom:
        secretKeyRef:
          name: s3-encryption-gateway-secrets
          key: encryption-password

  # ── Shared external Valkey — REQUIRED for blue/green ────────────────────
  # Both blue and green MUST point at the same Valkey cluster.
  multipartState:
    valkey:
      addr:
        value: "valkey-shared.mpu-state.svc.cluster.local:6379"
      # For production, enable TLS:
      # tls:
      #   enabled:
      #     value: "true"
      #   caFile:
      #     value: "/etc/valkey-tls/ca.crt"

# ── Pod lifecycle — critical for safe cutover ───────────────────────────────
# terminationGracePeriodSeconds should be ≥ 99th-p request duration + 10 s
# kube-proxy propagation tail. 60 s covers most S3 workloads; tune upward
# for workloads with large object CopyObject or multipart UploadPart calls.
terminationGracePeriodSeconds: 60
lifecycle:
  preStop:
    exec:
      # Sleep equal to the kube-proxy propagation tail so that the pod
      # drains in-flight connections before kubelet sends SIGTERM.
      command: ["sh", "-c", "sleep 10"]

# ── Per-colour HPA / PDB / Monitoring ──────────────────────────────────────
autoscaling:
  enabled: false  # Use static replicaCount for predictable blue/green sizing.

podDisruptionBudget:
  enabled: true
  minAvailable: 2   # Keep at least 2 blue pods live during node drains.

serviceMonitor:
  enabled: true
  labels:
    track: blue   # Enables per-track Prometheus filtering in Grafana.

podMonitor:
  enabled: false

# Ingress is NOT managed by the chart in a blue/green topology.
# The operator owns the shared Service (docs/examples/bluegreen/service.yaml).
ingress:
  enabled: false
