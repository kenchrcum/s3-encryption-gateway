{{/*
Traefik IngressRoute — single-backend path.

Rendered when `ingress.traefik.enabled: true` AND
`ingress.traefik.weighted.enabled: false`.

This replaces the standard `networking.k8s.io/v1` Ingress for operators
already running Traefik ≥ v3.0 and is the starting point for blue/green
and canary migrations. The standard Ingress (ingress.yaml) is mutually
exclusive with this template — enabling both causes a validation failure in
templates/_validate.tpl.

When `ingress.traefik.weighted.enabled: true`, the weighted TraefikService
template (traefikservice.yaml) renders both the TraefikService AND its
companion IngressRoute, so this template emits nothing.
*/}}
{{- if and .Values.ingress.traefik.enabled (not .Values.ingress.traefik.weighted.enabled) -}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "s3-encryption-gateway.fullname" . }}
  labels:
    {{- include "s3-encryption-gateway.labels" . | nindent 4 }}
spec:
  entryPoints:
    {{- toYaml .Values.ingress.traefik.entryPoints | nindent 4 }}
  routes:
    - match: Host(`{{ required "`ingress.traefik.host` is required when `ingress.traefik.enabled: true`" .Values.ingress.traefik.host }}`)
      kind: Rule
      services:
        - name: {{ include "s3-encryption-gateway.fullname" . }}
          port: {{ .Values.service.port }}
      {{- with .Values.ingress.traefik.middlewares }}
      middlewares:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- with .Values.ingress.traefik.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
