name: Release Helm Chart

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'helm/**'
      - '.github/workflows/helm.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'helm/**'
      - '.github/workflows/helm.yml'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.14.0

      - name: Run helm lint
        run: |
          cd helm/s3-encryption-gateway
          helm lint .

      - name: Add Helm repos
        run: helm repo add valkey https://valkey.io/valkey-helm/

      - name: Build chart dependencies
        run: helm dependency build helm/s3-encryption-gateway

      - name: Run helm template
        run: |
          cd helm/s3-encryption-gateway
          helm template test-release .

  release:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.14.0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Add Helm repos
        run: helm repo add valkey https://valkey.io/valkey-helm/

      - name: Build chart dependencies
        run: helm dependency build helm/s3-encryption-gateway

      - name: Check if chart version already released
        id: version_check
        run: |
          CHART_VERSION=$(grep '^version:' helm/s3-encryption-gateway/Chart.yaml | awk '{print $2}')
          RELEASE_TAG="s3-encryption-gateway-${CHART_VERSION}"
          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          if gh release view "${RELEASE_TAG}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "already_released=true" >> "$GITHUB_OUTPUT"
            echo "Chart version ${CHART_VERSION} already released — skipping chart-releaser."
          else
            echo "already_released=false" >> "$GITHUB_OUTPUT"
            echo "Chart version ${CHART_VERSION} is new — will release."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run chart-releaser
        if: steps.version_check.outputs.already_released == 'false'
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: helm
          config: .github/cr.yaml
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Copy chart README to gh-pages
        run: |
          git fetch origin gh-pages
          # Read the chart README from main before switching branches
          git show origin/main:helm/s3-encryption-gateway/README.md > /tmp/chart-readme.md
          git checkout gh-pages
          cp /tmp/chart-readme.md README.md
          git add README.md
          git diff --cached --quiet || git commit -m "docs: update chart README from main [skip ci]"
          git push origin gh-pages
